[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers"
markers = [
  "e2e: opt-in tests that may access live cloud APIs",
  "live: opt-in tests that create or mutate live cloud resources",
]

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
