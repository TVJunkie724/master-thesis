site_name: Twin2MultiCloud Documentation
site_description: Canonical project documentation for the Twin2MultiCloud thesis platform.
repo_url: https://github.com/TVJunkie724/master-thesis
docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_javascript:
  - javascripts/external-links.js

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/index.md
      - Platform Overview: architecture/platform-overview.md
      - Project Background: architecture/project-background.md
      - Roadmap: architecture/roadmap.md
      - Refactoring Roadmap: architecture/refactoring-roadmap.md
  - Components:
      - Management API: components/backend.md
      - Flutter UI: components/flutter.md
      - Optimizer: components/optimizer.md
      - Deployer: components/deployer.md
      - User Function Patterns: components/user-functions.md
  - Runtime:
      - Overview: runtime/index.md
  - Developer Guide:
      - Overview: developer-guide/index.md
      - Project Setup: developer-guide/setup.md
      - Project Structure: developer-guide/project-structure.md
      - Testing: developer-guide/testing.md
  - User Guide:
      - Overview: user-guide/index.md
  - Cloud Setup:
      - Overview: cloud-setup/index.md
      - Provider Links: cloud-setup/provider-links.md
  - API:
      - Overview: api/index.md
  - References:
      - Overview: references/index.md
      - Documentation Migration Matrix: references/documentation-migration-matrix.md
