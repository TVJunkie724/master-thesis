site_name: Twin2MultiCloud Documentation
site_description: Canonical project documentation for the Twin2MultiCloud thesis platform.
repo_url: https://github.com/TVJunkie724/master-thesis
docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_javascript:
  - javascripts/external-links.js

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/index.md
      - Fresh Clone: getting-started/fresh-clone.md
      - Supported Platforms: getting-started/supported-platforms.md
      - Runtime Profiles: getting-started/runtime-profiles.md
  - Architecture:
      - Overview: architecture/index.md
      - System Context: architecture/system-context.md
      - Responsibilities & Data Ownership: architecture/data-ownership.md
      - End-to-End Flows: architecture/end-to-end-flows.md
      - Security & Trust Boundaries: architecture/security-boundaries.md
      - Original to Current State: architecture/evolution.md
      - Project Background: architecture/project-background.md
      - Roadmap: architecture/roadmap.md
      - Refactoring Roadmap: architecture/refactoring-roadmap.md
  - Components:
      - Flutter UI: components/flutter.md
      - Management API: components/backend.md
      - Optimizer: components/optimizer.md
      - Deployer: components/deployer.md
      - User Function Patterns: components/user-functions.md
      - Documentation Site: components/docs-site.md
  - Runtime:
      - Overview: runtime/index.md
      - Authentication: runtime/authentication.md
      - Configuration Reference: runtime/configuration.md
      - State & Persistence: runtime/state-and-persistence.md
      - Operations & Logging: runtime/operations.md
      - Troubleshooting: runtime/troubleshooting.md
  - Developer Guide:
      - Overview: developer-guide/index.md
      - Project Setup: developer-guide/setup.md
      - Project Structure: developer-guide/project-structure.md
      - API & Contracts: developer-guide/contracts.md
      - Extension Points: developer-guide/extension-points.md
      - Testing: developer-guide/testing.md
  - User Guide:
      - Overview: user-guide/index.md
      - Sign In: user-guide/sign-in.md
      - Dashboard & Twins: user-guide/dashboard-and-twins.md
      - Cloud Accounts: user-guide/cloud-accounts.md
      - Configuration Workspace: user-guide/configuration-workspace.md
      - Pricing Review: user-guide/pricing-review.md
      - Deployment & Verification: user-guide/deployment.md
      - Multi-Cloud Walkthrough: user-guide/multi-cloud-walkthrough.md
      - Offline Demo: user-guide/demo.md
  - Cloud Setup:
