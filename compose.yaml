  #   ports:
  #     - "5000:8000"
  #   volumes:
  #     - ./twin2multicloud_cli:/app
  #   tty: true
  #   networks:
  #     - my_master_thesis_network

  2twin2clouds:
    image: 2twin2clouds
    build: 
      context: ./2-twin2clouds/
      dockerfile: Dockerfile
    ports:
      - "${THESIS_OPTIMIZER_PORT:-5003}:8000"
    volumes:
      - ./2-twin2clouds:/app
    environment:
      - TWIN2CLOUDS_MODE=INFO
    tty: true
    networks:
      - my_master_thesis_network

  3cloud-deployer:
    image: 3cloud-deployer
    build: 
      context: ./3-cloud-deployer
      dockerfile: Dockerfile
      target: development
    ports:
      - "${THESIS_DEPLOYER_PORT:-5004}:8000"
    volumes: 
      - ./3-cloud-deployer:/app/
      - deployer_runtime_state:/var/lib/twin2multicloud-deployer
    environment:
      - DEPLOYER_RUNTIME_STATE_ROOT=/var/lib/twin2multicloud-deployer/runtime-state
    tty: true
    networks:
      - my_master_thesis_network

  management-api:
    build:
      context: ./twin2multicloud_backend
      dockerfile: Dockerfile
    ports:
      - "${THESIS_MANAGEMENT_API_PORT:-5005}:5005"
    volumes:
      - ./twin2multicloud_backend:/app
      - ./twin2multicloud_backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - APP_ENV=development
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-local-development-jwt-secret-change-me}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-local-development-encryption-key-change-me}
      - DEBUG=true
      - DEV_AUTH_ENABLED=true
      - DEV_AUTH_TOKEN=${THESIS_DEV_AUTH_TOKEN:-dev-token}
      - PYTHONUNBUFFERED=1
      - SEED_DATA=false
      # - ENABLE_TEST_ENDPOINTS=true
      # External API URLs (Docker internal hostnames)
      - OPTIMIZER_URL=http://2twin2clouds:8000
      - DEPLOYER_URL=http://3cloud-deployer:8000
      - DEPLOYMENT_PREFLIGHT_MAX_AGE_MINUTES=${DEPLOYMENT_PREFLIGHT_MAX_AGE_MINUTES:-1440}
    networks:
      - my_master_thesis_network
    depends_on:
      - 2twin2clouds
      - 3cloud-deployer

  docs:
    build:
      context: ./docs-site
      dockerfile: Dockerfile
    ports:
      - "${THESIS_DOCS_PORT:-5010}:8000"
    volumes:
      - ./docs-site:/docs
    command: mkdocs serve --dev-addr=0.0.0.0:8000
    profiles:
      - docs

### LaTeX Thesis ###
  # Watch mode (default): docker compose run --rm thesis-latex
  # Compile once:         docker compose run --rm thesis-latex latexmk -pdf -interaction=nonstopmode -cd /thesis/main.tex
  thesis-latex:
    image: thesis-latex
    build:
      context: ./twin2multicloud-latex
      dockerfile: Dockerfile
    volumes:
      - ./twin2multicloud-latex:/thesis
    profiles:
      - latex

networks:
  my_master_thesis_network:
    driver: bridge

volumes:
  deployer_runtime_state:
