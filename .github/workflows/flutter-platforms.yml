name: Flutter platform gates

on:
  push:
    branches:
      - master
      - "codex/**"
    paths:
      - ".github/workflows/flutter-platforms.yml"
      - "scripts/check_flutter_architecture.py"
      - "scripts/tests/test_check_flutter_architecture.py"
      - "scripts/tests/test_thesis_entrypoint.py"
      - "thesis.sh"
      - "twin2multicloud_flutter/**"
  pull_request:
    paths:
      - ".github/workflows/flutter-platforms.yml"
      - "scripts/check_flutter_architecture.py"
      - "scripts/tests/test_check_flutter_architecture.py"
      - "scripts/tests/test_thesis_entrypoint.py"
      - "thesis.sh"
      - "twin2multicloud_flutter/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-platforms-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.0"
  FLUTTER_DIRECTORY: twin2multicloud_flutter
  BUILD_CONFIG: config/production.example.json

jobs:
  quality-and-web:
    name: Quality and Web release
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Install Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve dependencies
        working-directory: ${{ env.FLUTTER_DIRECTORY }}
        run: flutter pub get

      - name: Verify repository architecture contracts
        run: |
          python3 -m unittest \
            scripts.tests.test_check_flutter_architecture \
            scripts.tests.test_thesis_entrypoint
          python3 scripts/check_flutter_architecture.py
          bash -n thesis.sh

      - name: Verify Dart formatting
        working-directory: ${{ env.FLUTTER_DIRECTORY }}
        run: dart format --output=none --set-exit-if-changed lib test integration_test

      - name: Run static analysis
        working-directory: ${{ env.FLUTTER_DIRECTORY }}
        run: flutter analyze

      - name: Run unit and widget tests
        working-directory: ${{ env.FLUTTER_DIRECTORY }}
        run: flutter test

      - name: Build Web release
        working-directory: ${{ env.FLUTTER_DIRECTORY }}
        run: flutter build web --release --dart-define-from-file=${{ env.BUILD_CONFIG }}

  desktop-build:
    name: ${{ matrix.label }} release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            runner: macos-14
            target: macos
          - label: Windows
            runner: windows-2025
            target: windows
          - label: Linux
            runner: ubuntu-24.04
            target: linux
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Install Linux desktop toolchain
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang cmake libgtk-3-dev liblzma-dev ninja-build pkg-config

      - name: Install Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable native desktop target
        working-directory: ${{ env.FLUTTER_DIRECTORY }}
        run: flutter config --enable-${{ matrix.target }}-desktop

      - name: Resolve dependencies
        working-directory: ${{ env.FLUTTER_DIRECTORY }}
        run: flutter pub get

      - name: Build native release
        working-directory: ${{ env.FLUTTER_DIRECTORY }}
        run: flutter build ${{ matrix.target }} --release --dart-define-from-file=${{ env.BUILD_CONFIG }}
