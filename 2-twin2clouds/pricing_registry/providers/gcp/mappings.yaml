schema_version: pricing-registry-provider-mappings.v1
provider: gcp
mapping_version: "2026.06.08"
mappings:
  - intent_id: transfer.egress_gb
    mapping_version: "2026.07.18"
    review_status: reviewed
    normalization_rule: per_gib_to_gb
    expected_cardinality: one_or_more_per_region
    selection_mode: tier_series
    match:
      service_name: Compute Engine
      sku_name: Network Internet Data Transfer Out from EMEA to EMEA
      resource_family: Network
      unit: gibibyte
      tier:
        base_unit: By
        base_unit_description: byte
        base_unit_conversion_factor: 1073741824
        display_quantity: 1
        usage_unit: GiBy
      evidence:
        aggregation_level: ACCOUNT
        aggregation_interval: MONTHLY
        aggregation_count: 1
      provider_identifiers:
        service_id: 6F81-5844-456A
        sku_id: 5B70-B2D6-B4FC
    drift_markers:
      service_name: Compute Engine
      resource_family: Network
      provider_identifiers:
        service_id: 6F81-5844-456A
  - intent_id: iot.message_ingest
    review_status: draft
    normalization_rule: per_gb
    expected_cardinality: one_or_more_per_region
    match: {service_name: Cloud Pub/Sub}
    quantity_transform:
      from_unit: message
      to_unit: gb
      input_parameter: averageSizeOfMessageInKb
      reason: Google Pub/Sub pricing is volume-based, while the workload model starts from messages.
  - intent_id: functions.request
    review_status: draft
    normalization_rule: per_request
    expected_cardinality: one_or_more_per_region
    match: {service_name: Cloud Run Functions, resource_group: Invocations}
  - intent_id: functions.compute_gb_second
    review_status: draft
    normalization_rule: per_gb_second
    expected_cardinality: one_or_more_per_region
    match: {service_name: Cloud Run Functions, resource_group: Compute}
  - intent_id: storage.hot.storage_gb_month
    review_status: draft
    normalization_rule: per_gb_month
    expected_cardinality: one_or_more_per_region
    match: {service_name: Firestore}
  - intent_id: storage.hot.read_request
    review_status: draft
    normalization_rule: per_request
    expected_cardinality: one_or_more_per_region
    match: {service_name: Firestore, resource_group: Reads}
  - intent_id: storage.hot.write_request
    review_status: draft
    normalization_rule: per_request
    expected_cardinality: one_or_more_per_region
    match: {service_name: Firestore, resource_group: Writes}
  - intent_id: storage.cool.storage_gb_month
    review_status: draft
    normalization_rule: per_gb_month
    expected_cardinality: one_or_more_per_region
    match: {service_name: Cloud Storage, storage_class: Nearline}
  - intent_id: storage.archive.storage_gb_month
    review_status: draft
    normalization_rule: per_gb_month
    expected_cardinality: one_or_more_per_region
    match: {service_name: Cloud Storage, storage_class: Archive}
  - intent_id: storage.archive.write_request
    review_status: draft
    normalization_rule: per_10k_requests
    expected_cardinality: one_or_more_per_region
    match: {service_name: Cloud Storage, storage_class: Archive, resource_group: Operations}
  - intent_id: api.request_million
    review_status: draft
    normalization_rule: per_1m_requests
    expected_cardinality: one_or_more_per_region
    match: {service_name: API Gateway}
  - intent_id: orchestration.state_transition
    review_status: draft
    normalization_rule: per_state_transition
    expected_cardinality: one_or_more_per_region
    match: {service_name: Workflows}
  - intent_id: event_bus.event_million
    review_status: draft
    normalization_rule: per_1m_events
    expected_cardinality: one_or_more_per_region
    match: {service_name: Cloud Pub/Sub}
  - intent_id: digital_twin.query_unit
    review_status: draft
    normalization_rule: per_query_unit
    expected_cardinality: one_or_more_per_region
    match: {service_name: Compute Engine, equivalent: self_hosted_digital_twin}
  - intent_id: grafana.editor_user_month
    review_status: draft
    normalization_rule: per_user_month
    expected_cardinality: one_or_more_per_region
    match: {service_name: Compute Engine, equivalent: self_hosted_grafana_editor}
  - intent_id: grafana.viewer_user_month
    review_status: draft
    normalization_rule: per_user_month
    expected_cardinality: one_or_more_per_region
    match: {service_name: Compute Engine, equivalent: self_hosted_grafana_viewer}
