schema_version: pricing-registry-provider-mappings.v1
provider: aws
mapping_version: "2026.06.08"
mappings:
  - intent_id: transfer.egress_gb
    review_status: draft
    normalization_rule: per_gb
    expected_cardinality: one_or_more_per_region
    match: {service_code: AWSDataTransfer, unit: GB}
  - intent_id: iot.message_ingest
    review_status: draft
    normalization_rule: per_1m_messages
    expected_cardinality: one_or_more_per_region
    match: {service_code: AWSIoT, product_family: Messaging}
  - intent_id: functions.request
    review_status: draft
    normalization_rule: per_request
    expected_cardinality: one_or_more_per_region
    match: {service_code: AWSLambda, unit: Requests}
  - intent_id: functions.compute_gb_second
    review_status: draft
    normalization_rule: per_gb_second
    expected_cardinality: one_or_more_per_region
    match: {service_code: AWSLambda, unit: Lambda-GB-Second}
  - intent_id: storage.hot.storage_gb_month
    review_status: draft
    normalization_rule: per_gb_month
    expected_cardinality: one_or_more_per_region
    match: {service_code: AmazonDynamoDB, product_family: Database Storage}
  - intent_id: storage.hot.read_request
    review_status: draft
    normalization_rule: per_request
    expected_cardinality: one_or_more_per_region
    match: {service_code: AmazonDynamoDB, product_family: Read Request Units}
  - intent_id: storage.hot.write_request
    review_status: draft
    normalization_rule: per_request
    expected_cardinality: one_or_more_per_region
    match: {service_code: AmazonDynamoDB, product_family: Write Request Units}
  - intent_id: storage.cool.storage_gb_month
    review_status: draft
    normalization_rule: per_gb_month
    expected_cardinality: one_or_more_per_region
    match: {service_code: AmazonS3, storage_class: Infrequent Access}
  - intent_id: storage.archive.storage_gb_month
    review_status: draft
    normalization_rule: per_gb_month
    expected_cardinality: one_or_more_per_region
    match: {service_code: AmazonS3, storage_class: Glacier Deep Archive}
  - intent_id: storage.archive.write_request
    review_status: draft
    normalization_rule: per_1k_requests
    expected_cardinality: one_or_more_per_region
    match: {service_code: AmazonS3, storage_class: Glacier Deep Archive, product_family: Requests}
  - intent_id: api.request_million
    review_status: draft
    normalization_rule: per_1m_requests
    expected_cardinality: one_or_more_per_region
    match: {service_code: AmazonApiGateway, unit: Requests}
  - intent_id: orchestration.state_transition
    review_status: draft
    normalization_rule: per_state_transition
    expected_cardinality: one_or_more_per_region
    match: {service_code: AmazonStates, product_family: State Transition}
  - intent_id: event_bus.event_million
    review_status: draft
    normalization_rule: per_1m_events
    expected_cardinality: one_or_more_per_region
    match: {service_code: AWSEvents, product_family: Event}
  - intent_id: digital_twin.query_unit
    review_status: draft
    normalization_rule: per_query_unit
    expected_cardinality: one_or_more_per_region
    match: {service_code: AWSIoTTwinMaker, product_family: Query}
  - intent_id: grafana.editor_user_month
    review_status: draft
    normalization_rule: per_user_month
    expected_cardinality: one_or_more_per_region
    match: {service_code: AmazonGrafana, user_type: Editor}
  - intent_id: grafana.viewer_user_month
    review_status: draft
    normalization_rule: per_user_month
    expected_cardinality: one_or_more_per_region
    match: {service_code: AmazonGrafana, user_type: Viewer}
