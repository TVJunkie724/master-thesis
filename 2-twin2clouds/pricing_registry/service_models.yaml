schema_version: pricing-registry-service-models.v1
registry_version: "2026.06.08"
service_models:
  cost_model_v1:
    metric: cost
    description: Current thesis cost calculation model.
    intent_groups: [cost]
    intents:
      - transfer.egress_gb
      - iot.message_ingest
      - functions.request
      - functions.compute_gb_second
      - storage.hot.storage_gb_month
      - storage.hot.read_request
      - storage.hot.write_request
      - storage.cool.storage_gb_month
      - storage.archive.storage_gb_month
      - storage.archive.write_request
      - api.request_million
      - orchestration.state_transition
      - event_bus.event_million
      - digital_twin.query_unit
      - grafana.editor_user_month
      - grafana.viewer_user_month
    notes:
      - Digital Twins, AWS IoT TwinMaker, IoT Hub, transfer tiers, and storage operation tiers require provider-specific review before formula changes.
    azure_calculation_model:
      status: reviewed_for_phase_6
      issue: 90
      assumptions:
        - IoT Hub is modeled as monthly unit-tier pricing. Free tier applies up to its documented monthly message limit; paid tiers use the cheapest valid tier based on included messages per unit and maximum tier limit.
        - Azure Digital Twins message, operation, and query meters are calculated as separate usage dimensions. Historical `messagePrice`, `operationPrice`, and `queryPrice` fields are treated as Azure Retail Prices 1K billing blocks unless explicit per-unit keys are present.
        - Blob Storage read/write operation meters are normalized before multiplication; per-10K request keys are converted to one request.
        - Logic Apps and Event Grid action/event meters are normalized from provider billing blocks before multiplication.
        - Azure transfer/egress uses cumulative pricing tiers when tier data is available.
      open_research:
        - Verify Azure Digital Twins query-unit tier rows against live evidence before declaring all ADT query behavior final.
        - Verify Blob Storage operation and retrieval meters per replication/region/SKU before final cross-provider validation.
        - API Management is represented in the pricing registry, but not yet part of the executable layer model.
    aws_calculation_model:
      status: reviewed_for_phase_8
      issue: 92
      assumptions:
        - IoT Core message pricing is cumulative tier pricing over billable messages. Message size uses AWS 5KB billing increments before tier calculation.
        - IoT Core tier prices must be normalized to one billable message. Tiers may provide explicit `pricePerMessage`, normalized `price`, or `pricePerMillionMessages`.
        - S3 Infrequent Access and Glacier request/lifecycle prices are normalized before multiplication; per-1K and per-10K request keys are supported.
        - IoT TwinMaker entities, unified data access API calls, and queries are calculated as separate dimensions with explicit per-unit or per-block keys.
        - Step Functions and EventBridge action/event prices are normalized from explicit per-unit or true per-million/per-1K fields.
        - AWS transfer/egress uses cumulative pricing tiers when tier data is available.
      open_research:
        - Verify IoT TwinMaker pricing-plan and query/API units against service-specific evidence before final cross-provider validation.
        - Verify Managed Grafana editor/viewer user pricing against current AWS evidence; missing evidence remains review-required.
        - API Gateway and Scheduler are represented in the pricing registry, but not yet part of the executable layer model.
    gcp_pricing_evidence_model:
      status: reviewed_for_phase_9
      issue: 93
      required_catalog_operations:
        - operation: cloudbilling.services.list
          permission: cloudbilling.services.list
        - operation: cloudbilling.skus.list
          permission: cloudbilling.skus.list
      assumptions:
        - GCP Billing Catalog access must pass preflight before GCP Catalog evidence can be treated as live-valid.
        - Credential/auth failures are structured with operation and permission context and must redact service-account private keys, private key IDs, client emails, and tokens.
        - GCP Catalog SKUs are converted into selected/candidate/rejected evidence records with service, SKU, category, region, unit, pricing expression, and tiered-rate details.
        - GCP fallback pricing remains calculation-compatible only as review-required emergency data.
      open_research:
        - Verify exact Catalog mappings for Pub/Sub volume-based IoT equivalent, Firestore operations, Cloud Storage classes, Workflows, API Gateway/Service Control, and Compute Engine self-hosted equivalents.
        - Final GCP formula/tiering changes are deferred until live Billing Catalog evidence is validated.
